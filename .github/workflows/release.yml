name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run API tests
        run: go test ./apps/api/...

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Run web tests
        run: npm test
        working-directory: apps/web

      - name: Build web app
        run: npm run build
        working-directory: apps/web

  publish-images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: mtproxy-control-api
            dockerfile: Dockerfile.api
          - image_name: mtproxy-control-web
            dockerfile: Dockerfile.web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub settings
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN GitHub Actions secrets before creating a release."
            exit 1
          fi
          if [ -z "${IMAGE_NAMESPACE}" ]; then
            echo "Unable to resolve Docker Hub namespace. Set DOCKERHUB_USERNAME or DOCKERHUB_NAMESPACE."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=beta,enable=${{ contains(github.ref_name, 'beta') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-release:
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: |
            deploy/docker-compose.release.yml
            deploy/release.env.example
