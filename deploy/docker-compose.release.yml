services:
  api:
    image: ${IMAGE_REGISTRY:-docker.io/informativus}/mtproxy-control-api:${IMAGE_TAG:?set IMAGE_TAG in .env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_ADDR: ${API_ADDR:-:8080}
      DATABASE_PATH: ${DATABASE_PATH:-/data/panel.db}
      HEALTHCHECK_INTERVAL: ${HEALTHCHECK_INTERVAL:-30s}
    restart: unless-stopped
    volumes:
      - mtproxy-control-data:/data
      - ./ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${IMAGE_REGISTRY:-docker.io/informativus}/mtproxy-control-web:${IMAGE_TAG:?set IMAGE_TAG in .env}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8081}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mtproxy-control-data:
